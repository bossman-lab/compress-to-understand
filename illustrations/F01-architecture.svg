<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">全书五卷架构图</title>
  <desc id="desc">《学透》五卷垂直递进结构与底部导航</desc>
  <defs>
    <style>
      text{font-family:"Noto Sans SC","Microsoft YaHei","PingFang SC","Hiragino Sans GB",Arial,sans-serif;fill:#243042}
      .bg{fill:#fbfcff}.panel{fill:#fff;stroke:#d8e0ee;stroke-width:2}.small{font-size:20px}.mid{font-size:24px;font-weight:600}.big{font-size:34px;font-weight:700}.caption{font-size:18px;fill:#667085}.white{fill:#fff}.spine{rx:10}.chip{rx:14}.arrow{stroke:#7a5cff;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5cff"/>
    </marker>
    <linearGradient id="topGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f1edff"/>
      <stop offset="1" stop-color="#e8f9fb"/>
    </linearGradient>
  </defs>
  <rect class="bg" width="1200" height="900"/>
  <rect x="60" y="42" width="1080" height="78" rx="16" fill="url(#topGlow)" stroke="#d8e0ee"/>
  <text x="600" y="93" text-anchor="middle" class="big">《学透》五卷架构：从识别伪理解到建立压缩操作系统</text>

  <g transform="translate(110 155)">
    <rect x="0" y="0" width="980" height="105" rx="14" class="panel"/>
    <rect class="spine" x="0" y="0" width="150" height="105" fill="#7a5cff"/>
    <text x="75" y="44" text-anchor="middle" class="white mid">第一卷</text>
    <text x="75" y="75" text-anchor="middle" class="white small">为什么</text>
    <text x="185" y="39" class="mid">压缩即理解的理论基础</text>
    <rect class="chip" x="185" y="58" width="210" height="34" fill="#f1edff"/><text x="290" y="82" text-anchor="middle" class="small">ch01 伪理解</text>
    <rect class="chip" x="420" y="58" width="230" height="34" fill="#eefbfd"/><text x="535" y="82" text-anchor="middle" class="small">ch02 压缩即理解</text>
    <rect class="chip" x="675" y="58" width="245" height="34" fill="#f0fbf5"/><text x="797" y="82" text-anchor="middle" class="small">ch03 学习法即配置</text>
  </g>
  <path class="arrow" d="M600 266 V303"/>

  <g transform="translate(110 315)">
    <rect x="0" y="0" width="980" height="105" rx="14" class="panel"/>
    <rect class="spine" x="0" y="0" width="150" height="105" fill="#18a8b8"/>
    <text x="75" y="44" text-anchor="middle" class="white mid">第二卷</text>
    <text x="75" y="75" text-anchor="middle" class="white small">怎么学</text>
    <text x="185" y="39" class="mid">经典学习法的组件安装位置</text>
    <rect class="chip" x="185" y="58" width="160" height="34" fill="#eefbfd"/><text x="265" y="82" text-anchor="middle" class="small">ch04 记忆层</text>
    <rect class="chip" x="365" y="58" width="160" height="34" fill="#f1edff"/><text x="445" y="82" text-anchor="middle" class="small">ch05 认知层</text>
    <rect class="chip" x="545" y="58" width="190" height="34" fill="#f0fbf5"/><text x="640" y="82" text-anchor="middle" class="small">ch06 知识构建</text>
    <rect class="chip" x="755" y="58" width="175" height="34" fill="#fff4e8"/><text x="842" y="82" text-anchor="middle" class="small">ch07 实践反馈</text>
  </g>
  <path class="arrow" d="M600 426 V463"/>

  <g transform="translate(110 475)">
    <rect x="0" y="0" width="980" height="105" rx="14" class="panel"/>
    <rect class="spine" x="0" y="0" width="150" height="105" fill="#29a66a"/>
    <text x="75" y="44" text-anchor="middle" class="white mid">第三卷</text>
    <text x="75" y="75" text-anchor="middle" class="white small">操作系统</text>
    <text x="185" y="39" class="mid">筛选、编码、质检与代理协同</text>
    <rect class="chip" x="185" y="58" width="140" height="34" fill="#eefbfd"/><text x="255" y="82" text-anchor="middle" class="small">ch08 HLT</text>
    <rect class="chip" x="345" y="58" width="190" height="34" fill="#fff4e8"/><text x="440" y="82" text-anchor="middle" class="small">ch09 差异驱动</text>
    <rect class="chip" x="555" y="58" width="190" height="34" fill="#fdf0f0"/><text x="650" y="82" text-anchor="middle" class="small">ch10 精通五层</text>
    <rect class="chip" x="765" y="58" width="165" height="34" fill="#f1edff"/><text x="847" y="82" text-anchor="middle" class="small">ch11 Agent时代</text>
  </g>
  <path class="arrow" d="M600 586 V623"/>

  <g transform="translate(110 635)">
    <rect x="0" y="0" width="980" height="95" rx="14" class="panel"/>
    <rect class="spine" x="0" y="0" width="150" height="95" fill="#f28c28"/>
    <text x="75" y="40" text-anchor="middle" class="white mid">第四卷</text>
    <text x="75" y="70" text-anchor="middle" class="white small">实战</text>
    <text x="185" y="38" class="mid">把系统落到具体领域</text>
    <rect class="chip" x="185" y="56" width="210" height="32" fill="#fff4e8"/><text x="290" y="79" text-anchor="middle" class="small">ch12 编程语言</text>
    <rect class="chip" x="425" y="56" width="190" height="32" fill="#eefbfd"/><text x="520" y="79" text-anchor="middle" class="small">ch13 硬科学</text>
    <rect class="chip" x="645" y="56" width="210" height="32" fill="#f0fbf5"/><text x="750" y="79" text-anchor="middle" class="small">ch14 个人系统</text>
  </g>
  <path class="arrow" d="M600 736 V763"/>

  <g transform="translate(110 775)">
    <rect x="0" y="0" width="980" height="70" rx="14" class="panel"/>
    <rect class="spine" x="0" y="0" width="150" height="70" fill="#e64f5c"/>
    <text x="75" y="43" text-anchor="middle" class="white mid">第五卷</text>
    <text x="185" y="43" class="mid">边界：ch15 框架边界</text>
    <text x="925" y="43" text-anchor="end" class="caption">知道何时使用，也知道何时停止</text>
  </g>

  <g transform="translate(120 858)">
    <line x1="0" y1="0" x2="960" y2="0" stroke="#c9d4e6" stroke-width="10" stroke-linecap="round"/>
    <g>
      <circle cx="0" cy="0" r="12" fill="#7a5cff"/><text x="0" y="32" text-anchor="middle" class="caption">序幕</text>
      <circle cx="190" cy="0" r="12" fill="#7a5cff"/><text x="190" y="32" text-anchor="middle" class="caption">第一卷</text>
      <circle cx="380" cy="0" r="12" fill="#18a8b8"/><text x="380" y="32" text-anchor="middle" class="caption">第二卷</text>
      <circle cx="570" cy="0" r="12" fill="#29a66a"/><text x="570" y="32" text-anchor="middle" class="caption">第三卷</text>
      <circle cx="760" cy="0" r="12" fill="#f28c28"/><text x="760" y="32" text-anchor="middle" class="caption">第四卷</text>
      <circle cx="900" cy="0" r="12" fill="#e64f5c"/><text x="900" y="32" text-anchor="middle" class="caption">第五卷</text>
      <circle cx="960" cy="0" r="12" fill="#243042"/><text x="960" y="32" text-anchor="middle" class="caption">终章</text>
    </g>
  </g>
</svg>

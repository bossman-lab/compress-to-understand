<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">理解三层模型</title>
  <desc id="desc">L1能复述、L2能解释、L3能预测的递进模型</desc>
  <defs>
    <style>
      text{font-family:"Noto Sans SC","Microsoft YaHei","PingFang SC","Hiragino Sans GB",Arial,sans-serif;fill:#243042}
      .bg{fill:#fbfcff}.card{fill:#fff;stroke:#d8e0ee;stroke-width:2}.title{font-size:36px;font-weight:700}.h{font-size:28px;font-weight:700}.m{font-size:22px;font-weight:600}.t{font-size:19px}.s{font-size:17px;fill:#667085}.white{fill:#fff}.arrow{stroke:#8b98aa;stroke-width:4;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#8b98aa"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="600" y="64" text-anchor="middle" class="title">理解三层模型：从存档到可运行模型</text>
  <g transform="translate(95 135)">
    <rect x="0" y="155" width="300" height="260" rx="16" class="card"/>
    <rect x="0" y="155" width="300" height="58" rx="16" fill="#7a5cff"/><text x="150" y="193" text-anchor="middle" class="white h">L1 能复述</text>
    <text x="150" y="252" text-anchor="middle" class="m">压缩模式类比</text><text x="150" y="286" text-anchor="middle" class="t">存档 / zip</text>
    <line x1="35" y1="318" x2="265" y2="318" stroke="#e5ebf5"/>
    <text x="150" y="358" text-anchor="middle" class="m">检验标准</text><text x="150" y="392" text-anchor="middle" class="t">能完整说出原文要点</text>
    <rect x="74" y="60" width="152" height="86" rx="12" fill="#f1edff" stroke="#d8e0ee"/><path d="M100 126 h100 v-48 h-70 l-30 30z" fill="#fff" stroke="#7a5cff" stroke-width="3"/><text x="150" y="44" text-anchor="middle" class="s">保留文件名与内容</text>
  </g>
  <line class="arrow" x1="420" y1="425" x2="495" y2="425"/>
  <g transform="translate(500 135)">
    <rect x="0" y="95" width="300" height="320" rx="16" class="card"/>
    <rect x="0" y="95" width="300" height="58" rx="16" fill="#18a8b8"/><text x="150" y="133" text-anchor="middle" class="white h">L2 能解释</text>
    <text x="150" y="192" text-anchor="middle" class="m">压缩模式类比</text><text x="150" y="226" text-anchor="middle" class="t">有损压缩 / MP3</text>
    <line x1="35" y1="258" x2="265" y2="258" stroke="#e5ebf5"/>
    <text x="150" y="298" text-anchor="middle" class="m">检验标准</text><text x="150" y="332" text-anchor="middle" class="t">能用自己的话解释因果</text><text x="150" y="366" text-anchor="middle" class="t">知道哪些细节可丢弃</text>
    <rect x="70" y="0" width="160" height="78" rx="12" fill="#eefbfd" stroke="#d8e0ee"/><path d="M96 50 C130 16 174 16 204 50" fill="none" stroke="#18a8b8" stroke-width="5"/><circle cx="115" cy="52" r="8" fill="#18a8b8"/><circle cx="185" cy="52" r="8" fill="#18a8b8"/><text x="150" y="-14" text-anchor="middle" class="s">保留听得出的结构</text>
  </g>
  <line class="arrow" x1="825" y1="425" x2="900" y2="425"/>
  <g transform="translate(905 135)">
    <rect x="0" y="35" width="300" height="380" rx="16" class="card"/>
    <rect x="0" y="35" width="300" height="58" rx="16" fill="#29a66a"/><text x="150" y="73" text-anchor="middle" class="white h">L3 能预测</text>
    <text x="150" y="132" text-anchor="middle" class="m">压缩模式类比</text><text x="150" y="166" text-anchor="middle" class="t">可运行模型 / exe</text>
    <line x1="35" y1="198" x2="265" y2="198" stroke="#e5ebf5"/>
    <text x="150" y="238" text-anchor="middle" class="m">检验标准</text><text x="150" y="272" text-anchor="middle" class="t">输入改变后</text><text x="150" y="306" text-anchor="middle" class="t">能判断输出如何变化</text><text x="150" y="340" text-anchor="middle" class="t">能解释预测失败原因</text>
    <rect x="76" y="-70" width="148" height="82" rx="12" fill="#f0fbf5" stroke="#d8e0ee"/><rect x="104" y="-47" width="92" height="38" rx="6" fill="#fff" stroke="#29a66a" stroke-width="3"/><path d="M126 -28 h48 M174 -28 l-13 -10 M174 -28 l-13 10" stroke="#29a66a" stroke-width="4" fill="none"/><text x="150" y="-86" text-anchor="middle" class="s">结构能生成结果</text>
  </g>
  <g transform="translate(170 630)">
    <rect x="0" y="0" width="860" height="76" rx="18" fill="#fff4e8" stroke="#f28c28" stroke-width="2"/>
    <text x="430" y="48" text-anchor="middle" class="h">核心检验：改一个参数，你能准确预测结果吗？</text>
  </g>
</svg>
